workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Jacob HereNow Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gilgameshenterprise.herenow
      node: 20.18.0
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/HereNow.xcworkspace \
            --scheme HereNow
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        submit_to_testflight: true
