workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Jacob HereNow Key
    environment:
      node: 20.18.0
      groups:
        - ios_signing
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo $DIST_PROFILE | base64 --decode > "$PROFILES_HOME/herenow.mobileprovision"
          echo $DIST_CERT_P12 | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $DIST_CERT_PASSWORD
      - name: Build IPA
        script: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/herenow.mobileprovision"
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          echo "Profile UUID: $PROFILE_UUID, Team ID: $TEAM_ID"

          cat > /Users/builder/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.gilgameshenterprise.herenow</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcode-project build-ipa \
            --workspace ios/HereNow.xcworkspace \
            --scheme HereNow \
            --disable-xcpretty \
            --archive-xcargs "CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER='$PROFILE_UUID' PROVISIONING_PROFILE='$PROFILE_UUID'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
