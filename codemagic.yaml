workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Jacob HereNow Key
    environment:
      node: 20.18.0
      groups:
        - ios_signing
        - app_env
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$DIST_PROFILE" | base64 --decode > "$PROFILES_HOME/herenow.mobileprovision"
          PROFILE_SIZE=$(wc -c < "$PROFILES_HOME/herenow.mobileprovision")
          echo "Decoded profile size: $PROFILE_SIZE bytes"
          if [ "$PROFILE_SIZE" -lt 1000 ]; then
            echo "ERROR: DIST_PROFILE decoded to $PROFILE_SIZE bytes — env var is missing or empty in Codemagic"
            exit 1
          fi
          echo "$DIST_CERT_P12" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$DIST_CERT_PASSWORD"
      - name: Build IPA
        script: |
          set -eo pipefail
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/herenow.mobileprovision"

          if [ ! -f "$PROFILE_PATH" ]; then
            echo "ERROR: Profile not found at $PROFILE_PATH"
            ls "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(profiles dir empty)"
            exit 1
          fi
          echo "Profile size: $(wc -c < "$PROFILE_PATH") bytes"

          PROFILE_UUID=$(python3 -c "import plistlib; d=open('$PROFILE_PATH','rb').read(); s=d.find(b'<?xml'); p=plistlib.loads(d[s:d.rfind(b'</plist>')+8]); print(p['UUID'])")
          TEAM_ID=$(python3 -c "import plistlib; d=open('$PROFILE_PATH','rb').read(); s=d.find(b'<?xml'); p=plistlib.loads(d[s:d.rfind(b'</plist>')+8]); print(p['TeamIdentifier'][0])")
          echo "Profile UUID: $PROFILE_UUID, Team ID: $TEAM_ID"

          mkdir -p /tmp/xcodebuild_logs build/ios/ipa

          cat > /tmp/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>Com.gilgameshenterprise.herenow</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild archive \
            -workspace ios/HereNow.xcworkspace \
            -scheme HereNow \
            -archivePath /tmp/HereNow.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log

          if [ ! -d "/tmp/HereNow.xcarchive" ]; then
            echo "ERROR: Archive not created — check archive.log above for the real error"
            exit 1
          fi

          xcodebuild -exportArchive \
            -archivePath /tmp/HereNow.xcarchive \
            -exportPath build/ios/ipa/ \
            -exportOptionsPlist /tmp/export_options.plist \
            2>&1 | tee /tmp/xcodebuild_logs/export.log
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
