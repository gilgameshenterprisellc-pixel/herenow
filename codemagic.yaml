workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Jacob HereNow Key
    environment:
      node: 20.18.0
      vars:
        # Build React Native core from source instead of Expo SDK 54's
        # precompiled React.xcframework. Required for the patch-package fix in
        # patches/react-native+0.81.5.patch (TurboModule void-method NSException
        # → cross-thread JSError conversion → Hermes heap corruption crash) to
        # actually compile into the app. The template Podfile sets this with
        # ||= so this workflow value wins. Adds ~15-25 min to the build.
        RCT_USE_PREBUILT_RNCORE: "0"
      groups:
        - ios_signing
        - app_env
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set build number from App Store Connect
        # Build 15's first attempt failed at the PUBLISH step, not the build:
        #   ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE (409)
        #   "The bundle version must be higher than the previously uploaded version."
        # app.json still said 14 because the release bump lived in a separate
        # commit that the feature branch didn't carry. Hand-maintained build
        # numbers drift like that every time, and you only find out after a
        # 40-minute build.
        #
        # This asks App Store Connect what it actually has and adds one, so the
        # number can't collide no matter what app.json says. Runs after prebuild
        # so ios/ exists for agvtool to patch.
        script: |
          set -eo pipefail

          BUNDLE_ID=$(python3 -c "import json;print(json.load(open('app.json'))['expo']['ios']['bundleIdentifier'])")
          echo "Bundle ID: $BUNDLE_ID"

          # Resolve the numeric App Store app id from the bundle id, so this
          # needs no extra env var beyond the existing app_store_connect key.
          APP_ID=$(app-store-connect apps list \
                     --bundle-id-identifier "$BUNDLE_ID" \
                     --json 2>/dev/null \
                   | python3 -c "import json,sys;a=json.load(sys.stdin);print(a[0]['id'] if a else '')" 2>/dev/null || echo "")

          LATEST=""
          if [ -n "$APP_ID" ]; then
            echo "App Store app id: $APP_ID"
            LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_ID" 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_ID" 2>/dev/null || echo "")
            fi
          fi

          if [ -n "$LATEST" ]; then
            NEW_BUILD=$((LATEST + 1))
            echo "Latest on App Store Connect: $LATEST -> using $NEW_BUILD"
          else
            # Fall back to app.json + 1 rather than failing the build. Worst case
            # this collides again and you get the same clear 409, but a lookup
            # hiccup shouldn't cost a whole build.
            CURRENT=$(python3 -c "import json;print(json.load(open('app.json'))['expo']['ios']['buildNumber'])")
            NEW_BUILD=$((CURRENT + 1))
            echo "Could not read App Store Connect. Falling back to app.json ($CURRENT) -> $NEW_BUILD"
          fi

          cd ios
          agvtool new-version -all "$NEW_BUILD"
          echo "CFBundleVersion set to $NEW_BUILD"
      - name: Set up code signing
        script: |
          keychain initialize
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$DIST_PROFILE" | base64 --decode > "$PROFILES_HOME/herenow.mobileprovision"
          PROFILE_SIZE=$(wc -c < "$PROFILES_HOME/herenow.mobileprovision")
          echo "Decoded profile size: $PROFILE_SIZE bytes"
          if [ "$PROFILE_SIZE" -lt 1000 ]; then
            echo "ERROR: DIST_PROFILE decoded to $PROFILE_SIZE bytes — env var is missing or empty in Codemagic"
            exit 1
          fi
          echo "$DIST_CERT_P12" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$DIST_CERT_PASSWORD"
      - name: Build IPA
        script: |
          set -eo pipefail
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/herenow.mobileprovision"

          if [ ! -f "$PROFILE_PATH" ]; then
            echo "ERROR: Profile not found at $PROFILE_PATH"
            ls "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(profiles dir empty)"
            exit 1
          fi
          echo "Profile size: $(wc -c < "$PROFILE_PATH") bytes"

          PROFILE_UUID=$(python3 -c "import plistlib; d=open('$PROFILE_PATH','rb').read(); s=d.find(b'<?xml'); p=plistlib.loads(d[s:d.rfind(b'</plist>')+8]); print(p['UUID'])")
          TEAM_ID=$(python3 -c "import plistlib; d=open('$PROFILE_PATH','rb').read(); s=d.find(b'<?xml'); p=plistlib.loads(d[s:d.rfind(b'</plist>')+8]); print(p['TeamIdentifier'][0])")
          echo "Profile UUID: $PROFILE_UUID, Team ID: $TEAM_ID"

          mkdir -p /tmp/xcodebuild_logs build/ios/ipa

          cat > /tmp/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>Com.gilgameshenterprise.herenow</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild archive \
            -workspace ios/HereNow.xcworkspace \
            -scheme HereNow \
            -archivePath /tmp/HereNow.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log

          if [ ! -d "/tmp/HereNow.xcarchive" ]; then
            echo "ERROR: Archive not created — check archive.log above for the real error"
            exit 1
          fi

          xcodebuild -exportArchive \
            -archivePath /tmp/HereNow.xcarchive \
            -exportPath build/ios/ipa/ \
            -exportOptionsPlist /tmp/export_options.plist \
            2>&1 | tee /tmp/xcodebuild_logs/export.log
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
